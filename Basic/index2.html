<script>
    // ======================== Helper: วันที่ ========================
    function formatDateInput(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length >= 2) value = value.slice(0,2) + '/' + value.slice(2);
        if (value.length >= 5) value = value.slice(0,5) + '/' + value.slice(5,9);
        input.value = value.slice(0,10);
    }
    
    function convertToISO(dateStr) {
        if (!dateStr) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
        let parts = dateStr.split('/');
        if (parts.length === 3) {
            let [day, month, year] = parts;
            if (day && month && year && day.length===2 && month.length===2 && year.length===4) {
                return `${year}-${month}-${day}`;
            }
        }
        return '';
    }
    
    // ======================== Core Numerology ========================
    function reduceToSingleDigit(num) { 
        while(num > 9) {
            let s = 0;
            while(num > 0) { s += num % 10; num = Math.floor(num / 10); }
            num = s;
        }
        return num;
    }
    
    function calculateDestinyNumberTwoDigit(numberStr) {
        let str = numberStr.replace(/\D/g,'');
        if(str.length % 2 !== 0) str = '0' + str;
        const half = str.length / 2;
        const g1 = str.slice(0, half);
        const g2 = str.slice(half);
        const reduce = (g) => {
            let sum = 0;
            for(let i=0; i<g.length; i++) sum += parseInt(g[i]);
            while(sum > 9) {
                let s = 0;
                while(sum > 0) { s += sum % 10; sum = Math.floor(sum / 10); }
                sum = s;
            }
            return sum;
        };
        const d1 = reduce(g1);
        const d2 = reduce(g2);
        return parseInt(d1.toString() + d2.toString());
    }
    
    function calculateLifePathFromDateTime(birthDateStr, birthTimeStr) {
        const [year, month, day] = birthDateStr.split('-');
        const [hour, minute] = birthTimeStr.split(':');
        const raw = `${hour.padStart(2,'0')}${minute.padStart(2,'0')}${day.padStart(2,'0')}${month.padStart(2,'0')}${year}`;
        const destiny = calculateDestinyNumberTwoDigit(raw);
        const lifePath = reduceToSingleDigit(destiny);
        return { destiny, lifePath };
    }
    
    // ======================== Skill Map (เหมือนใน index.html) ========================
    const skillMap = {
        1: { strengths: ["กล้าเริ่มต้น","ตัดสินใจเด็ดขาด","เป็นผู้นำ"], skills: ["การวางแผน","การบริหารทีม","การรับฟัง"] },
        2: { strengths: ["สื่อสารดี","เข้าอกเข้าใจ","ทำงานเป็นทีม"], skills: ["การเจรจา","การกำหนดขอบเขต","การตัดสินใจด้วยตัวเอง"] },
        3: { strengths: ["สร้างสรรค์","มองโลกในแง่ดี","แสดงออกเก่ง"], skills: ["การมีระเบียบวินัย","การจดจ่อกับงาน","การจัดการอารมณ์"] },
        4: { strengths: ["เป็นระบบ","อดทน","ซื่อสัตย์"], skills: ["การปรับตัว","การคิดนอกกรอบ","การผ่อนคลาย"] },
        5: { strengths: ["ปรับตัวไว","กล้าเสี่ยง","มีเสน่ห์"], skills: ["การยับยั้งชั่งใจ","การทำตามแผน","การรับผิดชอบระยะยาว"] },
        6: { strengths: ["รับผิดชอบสูง","ห่วงใยผู้อื่น","สร้างสมดุล"], skills: ["การดูแลตัวเอง","การปฏิเสธ","การวางระบบ"] },
        7: { strengths: ["วิเคราะห์ลึก","ชอบเรียนรู้","เชื่อถือได้"], skills: ["การทำงานเป็นทีม","การสื่อสารให้คนเข้าใจ","การเปิดใจ"] },
        8: { strengths: ["มุ่งมั่น","บริหารเก่ง","มองการณ์ไกล"], skills: ["การสร้างทีม","การรับฟัง","การเสียสละ"] },
        9: { strengths: ["ใจกว้าง","มีอุดมการณ์","เห็นภาพรวม"], skills: ["การจัดการการเงินส่วนตัว","การรักษาขอบเขต","การพักผ่อน"] }
    };
    
    function getSkillData(lp) {
        let key = reduceToSingleDigit(lp);
        return skillMap[key] || { strengths: ["ศักยภาพเฉพาะตัว","การปรับตัว","ความยืดหยุ่น"], skills: ["การเรียนรู้ตลอดชีวิต","การตั้งเป้าหมาย","การสะท้อนคิด"] };
    }
    
    function getMusicPreviewUrl(lp) {
        let trackId = (reduceToSingleDigit(lp) % 10) + 1;
        return `https://www.soundhelix.com/examples/mp3/SoundHelix-Song-${trackId}.mp3`;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // ฟังก์ชันแสดงผลลัพธ์ (เหมือนใน index.html)
    function displayResult(nickname, destiny, lifePath) {
        const container = document.getElementById('resultContainer');
        const skill = getSkillData(lifePath);
        const strengthsList = skill.strengths.map(s => `<li class="flex items-start gap-2"><i class="fa-regular fa-circle-check text-green-500 mt-1"></i> <span>${s}</span></li>`).join('');
        const skillsList = skill.skills.map(s => `<li class="flex items-start gap-2"><i class="fa-regular fa-arrow-right text-blue-500 mt-1"></i> <span>${s}</span></li>`).join('');
        const progressHtml = `<div class="mt-4 space-y-2">${skill.skills.map((s, i) => `<div><span class="text-sm font-medium">${s}</span><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2 rounded-full smooth-progress" style="width: ${[38,45,52][i%3]}%"></div></div></div>`).join('')}</div>`;
        const musicPreviewId = `musicPreviewBtn_${Date.now()}`;
        const musicUrl = getMusicPreviewUrl(lifePath);
        
        const html = `
            <div class="bg-white rounded-2xl shadow-lg border border-indigo-100 result-card p-5 md:p-6">
                <div class="flex justify-between items-start gap-4 mb-4 flex-wrap">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-gray-800">✨ พิมพ์เขียวของ <span class="text-gray-200">${escapeHtml(nickname) || 'นักเดินทาง'} </span> <span class="text-indigo-400"> รหัสชีวิต ${lifePath}/${destiny}</span></h3>
                    </div>
                    <div id="playButtonAnchor" class="flex-shrink-0"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="font-semibold mb-2 text-gray-700"><i class="fa-regular fa-star text-amber-500"></i> จุดแข็งทางธรรมชาติ</p>
                        <ul class="space-y-1">${strengthsList}</ul>
                    </div>
                    <div>
                        <p class="font-semibold mb-2 text-gray-700"><i class="fa-regular fa-flag-checkered text-emerald-500"></i> ทักษะพัฒนา 90 วันแรก</p>
                        <ul class="space-y-1">${skillsList}</ul>
                    </div>
                </div>
                ${progressHtml}
            </div>
        `;
        
        container.innerHTML = html;
        container.classList.remove('hidden');

        const playBtnDynamic = document.getElementById('playButton');
        const anchor = document.getElementById('playButtonAnchor');
        if (playBtnDynamic && anchor) {
            anchor.appendChild(playBtnDynamic);
            playBtnDynamic.style.display = 'inline-flex';
            playBtnDynamic.style.position = 'relative';
            playBtnDynamic.style.margin = '0';
            playBtnDynamic.style.top = 'auto';
            playBtnDynamic.style.right = 'auto';
            playBtnDynamic.setAttribute('data-lifepath', lifePath);
            // ผูก event (ถ้ายังไม่มี)
            playBtnDynamic.addEventListener('click', (e) => {
                e.preventDefault();
                playMusicByLifePath(lifePath);
            });
        }
    }
    
    // ฟังก์ชันเล่นเพลงตาม lifePath (ใช้กับ global button)
    function playMusicByLifePath(lp) {
        const audio = document.getElementById('previewAudio');
        if (audio) {
            audio.src = getMusicPreviewUrl(lp);
            audio.play().catch(e => console.warn(e));
        }
    }
    
    // จัดการ form submit
    document.getElementById('musicForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        if (!fullName) {
            alert('กรุณากรอกชื่อ-สกุล');
            return;
        }
        
        const rawBirthDate = document.getElementById('birthDate').value;
        const birthTime = document.getElementById('birthTime').value || '06:30';
        
        if (!rawBirthDate) {
            alert('กรุณากรอกวันเกิด');
            return;
        }
        
        const birthDateISO = convertToISO(rawBirthDate);
        if (!birthDateISO) {
            alert('รูปแบบวันเกิดไม่ถูกต้อง (กรุณาใช้ DD/MM/YYYY เช่น 28/01/2015)');
            return;
        }
        
        const { destiny, lifePath } = calculateLifePathFromDateTime(birthDateISO, birthTime);
        
        // บันทึกข้อมูลลง localStorage สำหรับ global preview
        localStorage.setItem('mlq_last_lifepath', lifePath);
        localStorage.setItem('mlq_last_nickname', fullName);
        localStorage.setItem('mlq_last_destiny', destiny);
        localStorage.setItem('mlq_last_birthdate', birthDateISO);
        localStorage.setItem('mlq_last_birthtime', birthTime);
        
        // แสดงผลลัพธ์
        displayResult(fullName, destiny, lifePath);
        
        // เลื่อนไปที่ผลลัพธ์
        document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        

        // แสดงปุ่ม playButton และอัปเดตเพลงตาม lifePath ปัจจุบัน
        const playBtn = document.getElementById('playBttn');
        if (playBtn) {
            playBtn.style.display = 'inline-flex'; // หรือ remove class 'hidden'
            // เก็บ lifePath ล่าสุดไว้ที่ปุ่ม
            playBtn.setAttribute('data-lifepath', lifePath);
        }
        
    });
    
    // ปุ่ม global preview
    document.getElementById('globalMusicPreviewBtn')?.addEventListener('click', () => {
        let lp = localStorage.getItem('mlq_last_lifepath');
        if (lp) {
            playMusicByLifePath(parseInt(lp));
        } else {
            // fallback
            playMusicByLifePath(6);
            console.warn('No saved lifePath, playing default 6');
        }
    });
    
    // Auto-format วันเกิด (DD/MM/YYYY)
    const birthDateInput = document.getElementById('birthDate');
    if (birthDateInput) {
        birthDateInput.addEventListener('input', function() {
            formatDateInput(this);
        });
    }
    
    // โหลดข้อมูลเก่าถ้ามี (เติมฟอร์ม)
    const savedNickname = localStorage.getItem('mlq_last_nickname');
    const savedBirthdate = localStorage.getItem('mlq_last_birthdate');
    const savedBirthtime = localStorage.getItem('mlq_last_birthtime');
    if (savedNickname) document.getElementById('fullName').value = savedNickname;
    if (savedBirthdate) {
        // แปลง YYYY-MM-DD -> DD/MM/YYYY
        let parts = savedBirthdate.split('-');
        if (parts.length === 3) {
            document.getElementById('birthDate').value = `${parts[2]}/${parts[1]}/${parts[0]}`;
        } else {
            document.getElementById('birthDate').value = savedBirthdate;
        }
    }
    if (savedBirthtime) document.getElementById('birthTime').value = savedBirthtime;
    
    console.log("✅ index2.html (standalone) loaded");
</script>


    <!-- Initialization Script -->
    <script>
        (function() {
            // Volume slider live update
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeValue = document.getElementById('volumeValue');
            if (volumeSlider && volumeValue) {
                volumeSlider.addEventListener('input', function() {
                    volumeValue.textContent = this.value + '%';
                });
            }

            // Clear storage
            document.getElementById('clearStorageBtn')?.addEventListener('click', () => {
                if (window.FormUIController?.clearAllData) {
                    window.FormUIController.clearAllData();
                } else {
                    const keys = [
                        'psychomatrixUserData',
                        'psychomatrixNumerologyData',
                        'psychomatrixPsychomatrixData',
                        'psychomatrixLuckyNumberData',
                        'psychomatrixMusicCurrent',
                        'psychomatrixMusicDefault',
                        'psychomatrixEdgeFunctions'
                    ];
                    keys.forEach(k => localStorage.removeItem(k));
                    console.log('[Init] localStorage cleared');
                }
            });

            console.log("📄 DOM Content Loaded - Starting application...");
            
            const checkModules = setInterval(() => {
                if (window.AppMainController && window.DataContract && window.FormPsychomatrixController) {
                    clearInterval(checkModules);
                    try {
                        window.AppMainController.initialize();
                        console.log("✅ AppMain initialized");
                        
                        if (window.FormUIController) window.FormUIController.initialize();
                        if (window.MusicStylesController) window.MusicStylesController.initialize();
                        if (window.AudioController) window.AudioController.initialize();
                        if (window.UI && window.UI.initialize) window.UI.initialize();
                        
                        document.getElementById('loadingScreen')?.classList.add('hidden');
                    } catch (error) {
                        console.error("❌ Initialization error:", error);
                        const el = document.getElementById('loadingProgress');
                        if (el) el.textContent = 'Error: ' + error.message;
                    }
                }
            }, 100);

            setTimeout(() => {
                document.getElementById('loadingScreen')?.classList.add('hidden');
            }, 5000);
        })();
    </script>
