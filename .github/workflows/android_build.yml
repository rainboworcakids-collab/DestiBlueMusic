name: Build Android Debug APK

on:
  push:
    branches: [ Basic ]          # ← เปลี่ยนเป็นชื่อ branch ของคุณ
  workflow_dispatch:              # ← กดรันเองได้จาก GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึงโค้ดจาก Repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ติดตั้ง Java (จำเป็นสำหรับ Gradle/Android)
      - name: set up jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'  
          distribution: 'temurin'
          cache: gradle

      # 3. ติดตั้ง Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'            # cache เพื่อให้ build ครั้งต่อไปเร็วขึ้น

      # 4. ติดตั้ง dependencies (Capacitor)
      - name: Install dependencies
        run: npm ci               # ใช้ ci แทน install เพื่อความเสถียร

      # 5. Sync ไฟล์ web ไปยัง android folder
      - name: Capacitor Sync
        run: npx cap sync android

      # 6. ตั้งสิทธิ์ให้ gradlew รันได้
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 7. Cache Gradle เพื่อให้ build ครั้งต่อไปเร็วขึ้น
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 8. Build APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      # 9. อัปโหลด APK ให้ Download ได้
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLQ-Music-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30      # เก็บไว้ 30 วัน